<!-- ═══════════════════════════════════════════
     FAVICON CODE - Add to <head> section
     Place this after the <meta> tags and before CSS
════════════════════════════════════════════ -->

<!-- Standard favicon -->
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<!-- PNG favicons for modern browsers -->
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">

<!-- Apple Touch Icon (iOS home screen) -->
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">

<!-- Android Chrome -->
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">

<!-- Web App Manifest (PWA support) -->
<link rel="manifest" href="/site.webmanifest">

<!-- Safari Pinned Tab (optional - monochrome SVG) -->
<!-- <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#6b250d"> -->

<!-- Microsoft Tiles (Windows) -->
<meta name="msapplication-TileColor" content="#6b250d">
<meta name="msapplication-TileImage" content="/favicon-192.png">

<!-- Theme color for mobile browsers -->
<meta name="theme-color" content="#6b250d">
